paths:
  data_dir: ./sample_data/data
  bias_dir: ./sample_data/bias
  dark_dir: ./sample_data/darks
  flat_dir: ./sample_data/flats
  output_dir: ./outputs
  data_pattern: "*.fit"
  bias_pattern: "*.fit"
  dark_pattern: "*.fit"
  flat_pattern: "*.fit"

calibration:
  dark_exptime: 85.0
  flat_exptime: 1.0
  science_exptime: 85.0
  combination_method: median
  sigma_clip: null

detection:
  fwhm: 5.0
  threshold: 5000.0
  threshold_type: absolute
  exclude_border: true
  min_sharpness: 0.3
  max_sharpness: 1.0
  max_roundness: 0.5

photometry:
  method: aperture
  aperture_radius: 6.0
  annulus_inner: 15.0
  annulus_outer: 25.0
  optimize_aperture: false
  aperture_radii_test: [3, 4, 5, 6, 7, 8, 9, 10, 12, 15, 18]
  psf_size: 25
  psf_oversampling: 4
  psf_maxiters: 10
  psf_fit_shape: 11
  n_psf_stars: 20
  background_method: background2d
  background_box_size: 64
  background_filter_size: 3
  target_star_index: 1
  reference_star_indices: [2, 4]
  reference_weighting: inverse_variance

detrending:
  outlier_method: rolling_mad
  sigma_threshold: 3.0
  max_iterations: 5
  window_size: 20
  mad_sigma: 3.5
  contamination: 0.05
  remove_linear_trend: true
  test_airmass: true
  airmass_regression: huber
  huber_epsilon: 1.35

transit_model:
  period: 2.4842
  t0_guess: 2460969.747
  fix_t0: true
  limb_dark_u1: 0.40
  limb_dark_u2: 0.26
  eccentricity: 0.0
  omega: 90.0
  rp_guess: 0.093
  a_guess: 6.90
  inc_guess: 84.0
  rp_bounds: [0.070, 0.120]
  a_bounds_factor: 0.3
  inc_bounds_offset: 10.0
  r_star_solar: 1.51
  m_star_solar: 1.24

options:
  verbose: true
  save_intermediate: true
  plot_diagnostics: true
